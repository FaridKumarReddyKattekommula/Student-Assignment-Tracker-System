{% extends 'base.html' %}

{% block content %}

<h1>Edit Course</h1>

<form method="POST">

    <input
        type="text"
        name="course_name"
        value="{{ course.course_name }}"
        required
    >

    <input
        type="text"
        name="instructor"
        value="{{ course.instructor }}"
        required
    >

    <button type="submit">
        Update Course
    </button>

</form>

{% if message %}
<p style="color:red;">
    {{ message }}
</p>
{% endif %}

<br>

<a href="/courses">
    Back to Courses
</a>

{% endblock %}
